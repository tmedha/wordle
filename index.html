<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="title">Wordle</h1>
    <div class="header-controls">
      <span id="timer-display" class="timer-display" hidden>3:00</span>
      <button id="new-game-btn" class="icon-btn" title="New game" aria-label="New game">↻</button>
    </div>
  </header>

  <main id="mode-select" class="mode-select">
    <h2>Choose a mode</h2>
    <div class="mode-buttons">
      <button id="mode-untimed-btn" class="mode-btn" data-mode="untimed">
        <span class="mode-btn-title">Untimed</span>
        <span class="mode-btn-sub">Unlimited time, 6 guesses</span>
      </button>
      <button id="mode-timed-btn" class="mode-btn" data-mode="timed">
        <span class="mode-btn-title">Timed</span>
        <span class="mode-btn-sub">3 minutes, 6 guesses</span>
      </button>
    </div>
    <div class="stats-container" id="stats-summary"></div>
  </main>

  <main id="game-screen" class="game-screen" hidden>
    <div id="board" class="board" aria-live="polite"></div>
    <div id="keyboard" class="keyboard"></div>
  </main>

  <div id="end-overlay" class="overlay" hidden>
    <div class="overlay-card">
      <h2 id="end-title"></h2>
      <p id="end-word"></p>
      <dl id="end-stats" class="stats-summary"></dl>
      <div class="overlay-buttons">
        <button id="play-again-same-btn" class="mode-btn"></button>
        <button id="play-again-switch-btn" class="mode-btn"></button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
